name: B站整合包监控
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行检查
        id: check
        run: python check_new.py > result.json

      - name: 推送状态文件
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "auto update state"
          git push

      - name: 发送微信通知
        env:
          KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          import json, os, urllib.request
          with open("result.json") as f:
            data = json.load(f)
          if data["new"] == 0:
            print("无新视频")
            exit(0)
          key = os.environ.get("KEY")
          if not key:
            print("未设置 Server酱 Key，跳过通知")
            exit(0)
          videos = "\n".join([f"{'🟢' if v['kw']=='整合包更新' else '🟡'} {v['title']}\n  {v['url']}" for v in data["videos"]])
          content = f"发现 {data['new']} 个新视频\n\n{videos}"
          req = urllib.request.Request(
            f"https://sctapi.ftqq.com/{key}.send",
            data=urllib.parse.urlencode({"title": "B站整合包新视频", "content": content, "short": f"发现{data['new']}个新视频"}).encode(),
            headers={"Content-Type": "application/x-www-form-urlencoded"}
          )
          resp = urllib.request.urlopen(req, timeout=10)
          print(f"推送结果: {resp.read().decode()}")
        shell: python
